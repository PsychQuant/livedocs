# docs-router eval corpus.
#
# Each case tests whether a varied end-user prompt makes the docs-router skill
# TRIGGER a LiveDocs query and (for positives) give a correct/current answer.
#
# Per-case schema:
#   id:              unique slug
#   prompt:          the verbatim end-user prompt fed to `claude -p`
#   lang:            en | zh   (language axis)
#   category:        version | config | cli | runtime | negative
#   expected_trigger: bool     (should a LiveDocs MCP tool fire?)
#   expected_tools:  [str]     (which livedocs tool(s) are the natural route; informational)
#   oracle:
#     type:          self_check | structural | golden | none
#     # self_check: fetch the registry at eval time, assert the version appears in the answer
#     library:       package name          (self_check only)
#     ecosystem:     npm|pypi|crates|...    (self_check only)
#     # golden: dated exact-substring expectation
#     expect:        substring              (golden only)
#     last_verified: YYYY-MM-DD             (golden only)
#
# Positives assert (trigger AND oracle). Negatives assert (NOT trigger).

# ── version queries → latest_version (self_check oracle, rot-proof) ────────────
- id: version-tokio-zh
  prompt: "tokio 最新版是多少？"
  lang: zh
  category: version
  expected_trigger: true
  expected_tools: [latest_version, resolve_source]
  oracle: {type: self_check, library: tokio, ecosystem: crates}

- id: version-fastapi-en
  prompt: "What's the current released version of fastapi?"
  lang: en
  category: version
  expected_trigger: true
  expected_tools: [latest_version]
  oracle: {type: self_check, library: fastapi, ecosystem: pypi}

